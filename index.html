<!-- ───────── PWA install banner (Android prompt + iOS hint) ───────── -->
<div id="pwa-install" class="pwa-install" role="dialog" aria-label="Install Rehab.Wisal">
  <div class="pwa-install-icon">R<span style="opacity:.7">W</span></div>
  <div class="pwa-install-body">
    <div class="pwa-install-title">Install Rehab.Wisal</div>
    <div class="pwa-install-sub" id="pwa-install-sub">Add it to your home screen for a fullscreen, app-like experience.</div>
  </div>
  <div class="pwa-install-actions" id="pwa-install-actions">
    <button class="btn btn-primary btn-sm" id="pwa-install-btn">Install</button>
  </div>
  <button class="pwa-install-x" id="pwa-install-close" aria-label="Dismiss">&times;</button>
</div>

<script>
(function () {
  var KEY = 'mysalma_install_dismissed';
  var banner = document.getElementById('pwa-install');
  var sub = document.getElementById('pwa-install-sub');
  var actions = document.getElementById('pwa-install-actions');
  var installBtn = document.getElementById('pwa-install-btn');
  var closeBtn = document.getElementById('pwa-install-close');
  var deferred = null;

  function isStandalone() {
    return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
  }
  function dismissed() { try { return localStorage.getItem(KEY) === '1'; } catch (e) { return false; } }
  function remember() { try { localStorage.setItem(KEY, '1'); } catch (e) {} }
  function show() { banner.classList.add('show'); }
  function hide() { banner.classList.remove('show'); }

  closeBtn.addEventListener('click', function () { hide(); remember(); });

  // Already installed, or previously dismissed → do nothing.
  if (isStandalone() || dismissed()) return;

  // Android / Chrome / Edge: a real install prompt is available.
  window.addEventListener('beforeinstallprompt', function (e) {
    e.preventDefault();
    deferred = e;
    setTimeout(show, 2500);
  });
  installBtn.addEventListener('click', function () {
    if (!deferred) return;
    deferred.prompt();
    deferred.userChoice.finally(function () { deferred = null; hide(); remember(); });
  });
  window.addEventListener('appinstalled', function () { hide(); remember(); });

  // iOS Safari: no install event — show the "Add to Home Screen" steps instead.
  var ua = window.navigator.userAgent;
  var isIOS = /iPad|iPhone|iPod/.test(ua) && !window.MSStream;
  var isiOSSafari = isIOS && /Safari/.test(ua) && !/CriOS|FxiOS|EdgiOS/.test(ua);
  if (isiOSSafari) {
    sub.innerHTML = 'Tap the Share button <span class="pwa-ios-step">&#x2191;</span> then choose <b>“Add to Home Screen.”</b>';
    actions.style.display = 'none';
    setTimeout(show, 2500);
  }
})();
</script>

<!-- Register the service worker (enables install + offline). Harmless on http://localhost; requires https in production, which GitHub Pages provides. -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register('sw.js').catch(function (e) { console.warn('[Rehab.Wisal] SW registration failed:', e); });
    });
    // When a new service worker takes control (after a deploy), reload once so
    // everyone runs the latest code instead of stale cached JS.
    var __reloading = false;
    navigator.serviceWorker.addEventListener('controllerchange', function () {
      if (__reloading) return;
      __reloading = true;
      window.location.reload();
    });
  }
</script>
